{% extends "dashboard/layout.html" %}
{% load static %}

{% block head %}
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% endblock head %}

{% block content %}
<main class="container">
    <div class="control-panel">
        <h1 class="control-title">Painel de Controle</h1>
        
        <div class="control-buttons">
            <a href="/dress/" class="btn led-btn control-btn text-white">
                <i class="bi bi-lightbulb btn-icon"></i>
                Vestido LED
            </a>
            
            <a href="/detonador/" class="btn detonator-btn control-btn text-white">
                <i class="bi bi-megaphone btn-icon"></i>
                Detonador
            </a>

            <a href="/remote/" class="btn remote-btn control-btn text-white">
                <i class="bi bi-tv btn-icon"></i>
                Controle Universal
            </a>
        </div>
    </div>
</main>
{% endblock content %}

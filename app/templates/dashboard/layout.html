{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="{% static 'css/main.css' %}" />
        
        <link rel="icon" type="image/x-icon" href="{% static 'images/morea.png' %}">
        
        {% progressive_web_app_meta %}
        {% block head %} {% endblock head %}
    </head>
    <body>
        <div style="width: 100%; height: 56px"></div>
        <nav class="navbar bg-body-tertiary fixed-top">
            <div class="container-fluid">
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar"
                    aria-controls="offcanvasNavbar"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div
                    class="offcanvas offcanvas-start"
                    tabindex="-1"
                    id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel"
                >
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="offcanvas"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link" href="/">
                                    <i class="fas fa-chart-bar me-2"></i>Visão Geral
                                </a>
                            </li>
                            <hr />
                            <li class="nav-item">
                                <h5>Gerenciamento</h5>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/dress/">
                                    <i class="fas fa-tshirt me-2"></i>LED Vestido
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/detonador/">
                                    <i class="fas fa-bolt me-2"></i>Detonador
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/remote/">
                                    <i class="fas fa-tv-alt me-2"></i>Controle Universal
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/admin/">
                                    <i class="fas fa-users-cog me-2"></i>Admin
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        {% block content %} {% endblock content %}
        
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
    </body>
</html>

{% extends "dashboard/layout.html" %}
{% load static %}

{% block head %}
<title>{{ remote.name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/remote.css' %}">
{% endblock head %}

{% block content %}
<div class="remote-container">
    <div class="remote-header">
        <h1 class="remote-title">{{ remote.name }}</h1>
        <div class="remote-subtitle">{{ remote.get_type_display }}</div>
    </div>

    <div id="status-overlay">
        <i class="bi bi-info-circle"></i>
        <span id="status-text">Aguardando...</span>
    </div>

    <div class="remote-body">
        {% if remote.type == 'AC' %}
        <div class="ac-layout">
            <div class="ac-top-row">
                <button onclick="interact('power', 'Power')" 
                        class="btn btn-round {% if 'power' in button_map %}registered power{% endif %}">
                    <i class="bi bi-power"></i>
                </button>
                
                <button onclick="interact('mode', 'Modo')" 
                        class="btn btn-round {% if 'mode' in button_map %}registered{% endif %}">
                    <i class="bi bi-snow2"></i>
                </button>
                
                <button onclick="interact('fan', 'Ventilador')" 
                        class="btn btn-round {% if 'fan' in button_map %}registered{% endif %}">
                    <i class="bi bi-fan"></i>
                </button>
            </div>

            <div class="ac-center-row">
                <button onclick="interact('temp_down', 'Temp -')" 
                        class="btn btn-square {% if 'temp_down' in button_map %}registered{% endif %}">
                    <i class="bi bi-dash-lg"></i>
                </button>
                
                <div class="temp-display">
                    TEMP
                </div>
                
                <button onclick="interact('temp_up', 'Temp +')" 
                        class="btn btn-square {% if 'temp_up' in button_map %}registered{% endif %}">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>

            <div class="ac-bottom-row">
                <button onclick="interact('swing', 'Oscilar')" 
                        class="btn btn-pill {% if 'swing' in button_map %}registered{% endif %}">
                    <i class="bi bi-arrow-repeat"></i>
                    <span>Swing</span>
                </button>
                
                <button onclick="interact('timer', 'Timer')" 
                        class="btn btn-pill {% if 'timer' in button_map %}registered{% endif %}">
                    <i class="bi bi-clock"></i>
                    <span>Timer</span>
                </button>
            </div>
        </div>

        {% else %}
        <div class="default-layout">
            <div class="power-row">
                <button onclick="interact('power', 'Power')" 
                        class="btn btn-round btn-power-top {% if 'power' in button_map %}registered power{% endif %}">
                    <i class="bi bi-power"></i>
                </button>
            </div>

            <div class="top-row">
                <button onclick="interact('input', 'Mudar Entrada')" 
                        class="btn btn-round {% if 'input' in button_map %}registered{% endif %}">
                    <i class="bi bi-input-cursor"></i>
                </button>
                
                <button onclick="interact('home', 'Home')" 
                        class="btn btn-round {% if 'home' in button_map %}registered{% endif %}">
                    <i class="bi bi-house"></i>
                </button>
                
                <button onclick="interact('back', 'Voltar')" 
                        class="btn btn-round {% if 'back' in button_map %}registered{% endif %}">
                    <i class="bi bi-arrow-left"></i>
                </button>
            </div>

            <div class="dpad-section">
                <div class="dpad-container">
                    <div class="dpad-row">
                        <button onclick="interact('up', 'Cima')" 
                                class="btn btn-square dpad-btn {% if 'up' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-up"></i>
                        </button>
                    </div>
                    
                    <div class="dpad-row">
                        <button onclick="interact('left', 'Esquerda')" 
                                class="btn btn-square dpad-btn {% if 'left' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                        
                        <button onclick="interact('ok', 'OK')" 
                                class="btn btn-ok {% if 'ok' in button_map %}registered{% endif %}">
                            <span>OK</span>
                        </button>
                        
                        <button onclick="interact('right', 'Direita')" 
                                class="btn btn-square dpad-btn {% if 'right' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                    
                    <div class="dpad-row">
                        <button onclick="interact('down', 'Baixo')" 
                                class="btn btn-square dpad-btn {% if 'down' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-down"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="volume-channel-section">
                <div class="control-column">
                    <div class="control-label">Volume</div>
                    <div class="volume-controls">
                        <button onclick="interact('vol_up', 'Vol +')" 
                                class="btn btn-volume {% if 'vol_up' in button_map %}registered{% endif %}">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                        
                        <button onclick="interact('vol_down', 'Vol -')" 
                                class="btn btn-volume {% if 'vol_down' in button_map %}registered{% endif %}">
                            <i class="bi bi-dash-lg"></i>
                        </button>
                    </div>
                </div>

                <div class="control-column">
                    <div class="control-label">Canal</div>
                    <div class="channel-controls">
                        <button onclick="interact('ch_up', 'Canal +')" 
                                class="btn btn-volume {% if 'ch_up' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-up"></i>
                        </button>
                        
                        <button onclick="interact('ch_down', 'Canal -')" 
                                class="btn btn-volume {% if 'ch_down' in button_map %}registered{% endif %}">
                            <i class="bi bi-chevron-down"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bottom-row">
                <button onclick="interact('menu', 'Menu')" 
                        class="btn btn-pill {% if 'menu' in button_map %}registered{% endif %}">
                    <i class="bi bi-list"></i>
                    <span>Menu</span>
                </button>
                
                <button onclick="interact('mute', 'Mudo')" 
                        class="btn btn-pill {% if 'mute' in button_map %}registered{% endif %}">
                    <i class="bi bi-volume-mute"></i>
                    <span>Mudo</span>
                </button>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    const registeredKeys = {{ button_map|safe }};
    let learningButton = null;

    function interact(keyName, label) {
        const button = event.currentTarget;
        
        if (keyName in registeredKeys) {
            sendSignal(registeredKeys[keyName], button);
        } else {
            if (confirm(`Botão "${label}" não cadastrado. Deseja cadastrar agora?`)) {
                startLearning(keyName, label, button);
            }
        }
    }

    function sendSignal(btnId, button) {
        const wasRegistered = button.classList.contains('registered');
        
        button.classList.add('registered');
        button.style.transform = 'scale(0.95)';
        
        fetch(`/remote/api/click/${btnId}/`)
            .then(r => r.json())
            .then(data => {
                setTimeout(() => {
                    button.style.transform = '';
                    
                    if (!wasRegistered) {
                        setTimeout(() => {
                            button.classList.remove('registered');
                        }, 300);
                    }
                    
                    if (data.status === 'success') {
                        showStatus("Comando enviado com sucesso", "success");
                    } else {
                        showStatus("Erro: " + data.msg, "error");
                    }
                }, 200);
            })
            .catch(error => {
                button.style.transform = '';
                if (!wasRegistered) {
                    button.classList.remove('registered');
                }
                showStatus("Erro de conexão com o servidor", "error");
            });
    }

    function startLearning(keyName, label, button) {
        if (learningButton) {
            learningButton.classList.remove('learning');
        }
        
        learningButton = button;
        button.classList.add('learning');
        
        showStatus("Aponte o controle físico e pressione o botão...", "learning");
        
        fetch(`/remote/api/learn/{{ remote.id }}/?key=${keyName}&label=${encodeURIComponent(label)}`)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'listening') {
                    checkLearningStatus(keyName, button);
                } else {
                    button.classList.remove('learning');
                    showStatus("Erro: " + data.msg, "error");
                }
            });
    }

    function checkLearningStatus(keyName, button) {
        let attempts = 0;
        const maxAttempts = 30;
        
        const checkInterval = setInterval(() => {
            attempts++;
            
            if (keyName in registeredKeys) {
                clearInterval(checkInterval);
                button.classList.remove('learning');
                showStatus("Botão cadastrado com sucesso!", "success");
                
                setTimeout(() => {
                    window.location.reload();
                }, 1500);
                return;
            }
            
            if (attempts >= maxAttempts) {
                clearInterval(checkInterval);
                button.classList.remove('learning');
                showStatus("Tempo esgotado para cadastro", "error");
            }
        }, 2000);
    }

    function showStatus(text, type = "info") {
        const overlay = document.getElementById('status-overlay');
        const statusText = document.getElementById('status-text');
        
        overlay.classList.remove('success', 'error', 'learning', 'show');
        
        overlay.classList.add(type, 'show');
        overlay.innerHTML = `
            <i class="bi ${getStatusIcon(type)}"></i>
            <span id="status-text">${text}</span>
        `;
        
        setTimeout(() => {
            overlay.classList.remove('show');
            setTimeout(() => {
                overlay.classList.remove('success', 'error', 'learning');
            }, 400);
        }, 2500);
    }

    function getStatusIcon(type) {
        switch(type) {
            case 'success': return 'bi-check-circle';
            case 'error': return 'bi-exclamation-circle';
            case 'learning': return 'bi-record-circle';
            default: return 'bi-info-circle';
        }
    }

    document.addEventListener('touchstart', function() {}, {passive: true});

    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, {passive: false});
    });

    if ('ontouchstart' in window) {
        document.body.classList.add('touch-device');
    }
</script>
{% endblock content %}
